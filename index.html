<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEE YOU AT OFFF</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --margin: 4vh;
    --gap: -4px;
    --s: calc((100vh - 2 * var(--margin) - 3 * var(--gap)) / 4);
}

body {
    overflow: hidden;
    background: #000;
    font-family: Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
}

#start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

#start-btn {
    padding: 16px 32px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    background: white;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#scene {
    display: none;
    width: 100vw;
    height: 100vh;
    perspective: 1600px;
    position: relative;
}

.cube {
    width: var(--s);
    height: var(--s);
    position: absolute;
    left: 50%;
    transform-style: preserve-3d;
}

#cube1 { top: var(--margin); }
#cube2 { top: calc(var(--margin) + 1 * (var(--s) + var(--gap))); }
#cube3 { top: calc(var(--margin) + 2 * (var(--s) + var(--gap))); }
#cube4 { top: calc(var(--margin) + 3 * (var(--s) + var(--gap))); }

.face {
    position: absolute;
    width: var(--s);
    height: var(--s);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--s) * 0.68);
    font-weight: bold;
    color: #fff;
    background: black;
    backface-visibility: hidden;
    user-select: none;
}

/* 2 faces — 180° apart */
.faces-2 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) * 0.04)); }
.faces-2 .face:nth-child(2) { transform: rotateY(180deg) translateZ(calc(var(--s) * 0.04)); }

/* 3 faces — 120° apart  |  inradius ≈ s * 0.289 */
.faces-3 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) * 0.289)); }
.faces-3 .face:nth-child(2) { transform: rotateY(120deg) translateZ(calc(var(--s) * 0.289)); }
.faces-3 .face:nth-child(3) { transform: rotateY(240deg) translateZ(calc(var(--s) * 0.289)); }

/* 4 faces — 90° apart  |  inradius = s / 2 */
.faces-4 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(2) { transform: rotateY( 90deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(3) { transform: rotateY(180deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(4) { transform: rotateY(270deg) translateZ(calc(var(--s) / 2)); }

</style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">Start</button>
</div>

<div id="scene">

    <!-- SEE (3 faces) — face1 rests as O -->
    <div id="cube1" class="cube faces-3">
        <div class="face">S</div>
        <div class="face">E</div>
        <div class="face">E</div>
    </div>

    <!-- YOU (3 faces) — face1 rests as F -->
    <div id="cube2" class="cube faces-3">
        <div class="face">Y</div>
        <div class="face">O</div>
        <div class="face">U</div>
    </div>

    <!-- AT (2 faces) — face1 rests as F -->
    <div id="cube3" class="cube faces-2">
        <div class="face">A</div>
        <div class="face">T</div>
    </div>

    <!-- OFFF (4 faces) — face1 rests as F -->
    <div id="cube4" class="cube faces-4">
        <div class="face">O</div>
        <div class="face">F</div>
        <div class="face">F</div>
        <div class="face">F</div>
    </div>

</div>

<script>
const btn     = document.getElementById("start-btn");
const startSc = document.getElementById("start-screen");
const scene   = document.getElementById("scene");

// lerp descends so cube1 (top) settles first, cube4 (bottom) last
const cubes = [
    { id: "cube1", lerp: 0.075, step: 120, faceCount: 3, rest: "O", spin: "S" },
    { id: "cube2", lerp: 0.060, step: 120, faceCount: 3, rest: "F", spin: "Y" },
    { id: "cube3", lerp: 0.048, step: 180, faceCount: 2, rest: "F", spin: "A" },
    { id: "cube4", lerp: 0.036, step:  90, faceCount: 4, rest: "F", spin: "O" },
].map(c => ({
    ...c,
    el:         document.getElementById(c.id),
    rot:        0,
    target:     0,
    faceIndex:  0,
}));

// cache face1 ref and set rest letter immediately
cubes.forEach(c => {
    c.face1 = c.el.querySelector(".face");
    c.face1.textContent = c.rest;
});

let gamma    = 0;
let lastMove = 0;
const COOLDOWN  = 130;
const THRESHOLD = 9;

function trigger(dir) {
    cubes.forEach(c => {
        c.faceIndex = ((c.faceIndex + dir) % c.faceCount + c.faceCount) % c.faceCount;
        c.target += dir * c.step;
    });
    lastMove = Date.now();
}

function handleOrientation(e) { gamma = e.gamma || 0; }

function updateTilt() {
    const now = Date.now();
    if (now - lastMove < COOLDOWN) return;
    if      (gamma >  THRESHOLD) trigger( 1);
    else if (gamma < -THRESHOLD) trigger(-1);
}

function loop() {
    updateTilt();

    cubes.forEach(c => {
        c.rot += (c.target - c.rot) * c.lerp;
        c.el.style.transform = `translateX(-50%) rotateY(${c.rot}deg)`;

        // face1 is visible when it faces the viewer (within ±90° of front)
        const r = ((c.rot % 360) + 360) % 360;
        const face1Visible = r < 90 || r > 270;

        // only swap text while face1 is hidden — so the correct letter
        // is already in place by the time the face rotates into view
        if (!face1Visible) {
            c.face1.textContent = (c.faceIndex === 0) ? c.rest : c.spin;
        }
    });

    requestAnimationFrame(loop);
}

// touch swipe
let touchStartX = 0;
window.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
}, { passive: true });
window.addEventListener("touchend", e => {
    if (scene.style.display === "none") return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) trigger(dx < 0 ? -1 : 1);
}, { passive: true });

// keyboard fallback
window.addEventListener("keydown", e => {
    if (scene.style.display === "none") return;
    if (e.key === "ArrowRight") gamma =  15;
    if (e.key === "ArrowLeft")  gamma = -15;
});
window.addEventListener("keyup", e => {
    if (e.key === "ArrowRight" || e.key === "ArrowLeft") gamma = 0;
});

btn.onclick = () => {
    const go = () => {
        startSc.style.display = "none";
        scene.style.display = "block";
        window.addEventListener("deviceorientation", handleOrientation);
        loop();
    };
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
            .then(res => { if (res === "granted") go(); })
            .catch(() => go());
    } else {
        go();
    }
};
</script>

</body>
</html>
