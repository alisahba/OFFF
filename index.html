<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEE YOU AT OFFF</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --margin: 4vh;
    --gap: -4px;
    --s: calc((100vh - 2 * var(--margin) - 3 * var(--gap)) / 4);
}

body {
    overflow: hidden;
    background: #000;
    font-family: Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
}

#start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

#start-btn {
    padding: 16px 32px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    background: black;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

#scene {
    display: none;
    width: 100vw;
    height: 100vh;
    perspective: 1600px;
    position: relative;
}

.slot {
    width: var(--s);
    height: var(--s);
    position: absolute;
    left: 50%;
    transform-style: preserve-3d;
}

#slot1 { top: var(--margin); }
#slot2 { top: calc(var(--margin) + 1 * (var(--s) + var(--gap))); }
#slot3 { top: calc(var(--margin) + 2 * (var(--s) + var(--gap))); }
#slot4 { top: calc(var(--margin) + 3 * (var(--s) + var(--gap))); }

.cube {
    width: var(--s);
    height: var(--s);
    position: absolute;
    top: 0; left: 0;
    transform-style: preserve-3d;
}

.face {
    position: absolute;
    width: var(--s);
    height: var(--s);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--s) * 0.68);
    font-weight: bold;
    color: #fff;
    background: FF0000;
    backface-visibility: hidden;
    user-select: none;
}

.faces-2 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) * 0.04)); }
.faces-2 .face:nth-child(2) { transform: rotateY(180deg) translateZ(calc(var(--s) * 0.04)); }

.faces-3 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) * 0.289)); }
.faces-3 .face:nth-child(2) { transform: rotateY(120deg) translateZ(calc(var(--s) * 0.289)); }
.faces-3 .face:nth-child(3) { transform: rotateY(240deg) translateZ(calc(var(--s) * 0.289)); }

.faces-4 .face:nth-child(1) { transform: rotateY(  0deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(2) { transform: rotateY( 90deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(3) { transform: rotateY(180deg) translateZ(calc(var(--s) / 2)); }
.faces-4 .face:nth-child(4) { transform: rotateY(270deg) translateZ(calc(var(--s) / 2)); }

</style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">Start</button>
</div>

<div id="scene">

    <div class="slot" id="slot1">
        <div class="cube faces-3" id="spin1">
            <div class="face">S</div>
            <div class="face">E</div>
            <div class="face">E</div>
        </div>
        <div class="cube faces-3" id="rest1">
            <div class="face">O</div>
            <div class="face">E</div>
            <div class="face">E</div>
        </div>
    </div>

    <div class="slot" id="slot2">
        <div class="cube faces-3" id="spin2">
            <div class="face">Y</div>
            <div class="face">O</div>
            <div class="face">U</div>
        </div>
        <div class="cube faces-3" id="rest2">
            <div class="face">F</div>
            <div class="face">O</div>
            <div class="face">U</div>
        </div>
    </div>

    <div class="slot" id="slot3">
        <div class="cube faces-2" id="spin3">
            <div class="face">A</div>
            <div class="face">T</div>
        </div>
        <div class="cube faces-2" id="rest3">
            <div class="face">F</div>
            <div class="face">T</div>
        </div>
    </div>

    <div class="slot" id="slot4">
        <div class="cube faces-4" id="spin4">
            <div class="face">O</div>
            <div class="face">F</div>
            <div class="face">F</div>
            <div class="face">F</div>
        </div>
        <div class="cube faces-4" id="rest4">
            <div class="face">F</div>
            <div class="face">F</div>
            <div class="face">F</div>
            <div class="face">F</div>
        </div>
    </div>

</div>

<script>
const btn     = document.getElementById("start-btn");
const startSc = document.getElementById("start-screen");
const scene   = document.getElementById("scene");

// lerp descends: cube1 settles first (top), cube4 last (bottom)
const cubes = [
    { lerp: 0.075, step: 120, faceCount: 3 },
    { lerp: 0.060, step: 120, faceCount: 3 },
    { lerp: 0.048, step: 180, faceCount: 2 },
    { lerp: 0.036, step:  90, faceCount: 4 },
].map((c, i) => ({
    ...c,
    slot:         document.getElementById(`slot${i + 1}`),
    spinCube:     document.getElementById(`spin${i + 1}`),
    restCube:     document.getElementById(`rest${i + 1}`),
    rot:          0,
    target:       0,
    faceIndex:    0,
    atRest:       true,
    returning:    false,
    leavingRest:  false,   // true while departing rest before face1 is hidden
}));

cubes.forEach(c => {
    c.spinCube.style.display = "none";
    c.restCube.style.display = "block";
});

let tiltX    = 0;  // gravity along device X axis (m/s²) — short-side lean
let beta     = 0;  // front-back tilt, used to gate upright detection
let lastMove = 0;
const THRESHOLD      = 1.0;  // min |tiltX| (m/s²) before rotation starts (~9° lean)
const VELOCITY_SCALE = 2.0;  // rotation degrees per frame per m/s² of tiltX
const UPRIGHT_MIN    = 50;   // beta (°) — phone must be this upright to react

function showSpin(c) {
    c.leavingRest = false;
    c.spinCube.style.display = "block";
    c.restCube.style.display = "none";
}

function showRest(c) {
    c.atRest      = true;
    c.returning   = false;
    c.leavingRest = false;
    c.spinCube.style.display = "none";
    c.restCube.style.display = "block";
}

function trigger(dir) {
    cubes.forEach(c => {
        c.faceIndex = ((c.faceIndex + dir) % c.faceCount + c.faceCount) % c.faceCount;
        c.target   += dir * c.step;
        c.returning = false;
        if (c.atRest) {
            c.atRest      = false;
            c.leavingRest = true;   // keep rest cube visible until face1 is hidden
        }
    });
    lastMove = Date.now();
}

function handleOrientation(e) {
    beta = e.beta || 0;
}

function handleMotion(e) {
    if (e.accelerationIncludingGravity)
        tiltX = e.accelerationIncludingGravity.x || 0;
}

function loop() {
    // only active when phone is held upright (beta > UPRIGHT_MIN)
    const isUpright = Math.abs(beta) > UPRIGHT_MIN;

    const deadband = isUpright && tiltX >  THRESHOLD ?  tiltX - THRESHOLD
                   : isUpright && tiltX < -THRESHOLD ?  tiltX + THRESHOLD
                   : 0;

    if (deadband !== 0) {
        lastMove = Date.now();
        cubes.forEach(c => {
            if (c.atRest) { c.atRest = false; c.leavingRest = true; }
            c.returning = false;
            c.target += deadband * VELOCITY_SCALE;
        });
    }

    const idleMs = Date.now() - lastMove;

    cubes.forEach(c => {
        c.rot += (c.target - c.rot) * c.lerp;
        c.slot.style.transform = `translateX(-50%) rotateY(${c.rot}deg)`;

        if (c.atRest) return;

        const r           = ((c.rot % 360) + 360) % 360;
        const face1Hidden = r >= 90 && r <= 270;

        // leaving rest: swap rest→spin once face1 rotates into the hidden zone
        if (c.leavingRest && face1Hidden) {
            showSpin(c);
        }

        const settled = Math.abs(c.rot - c.target) < 0.5;

        // once this cube has settled and the user has been idle 200ms,
        // send it back to the nearest home position (multiple of 360°)
        if (!c.leavingRest && !c.returning && settled && idleMs > 200) {
            c.returning = true;
            c.target    = Math.round(c.target / 360) * 360;
        }

        // while returning: swap to rest cube only when face1 is hidden
        // if the cube reaches its target while face1 is still visible,
        // extend by 360° and keep spinning until it passes through the hidden zone
        if (c.returning) {
            if (face1Hidden) {
                showRest(c);
            } else if (Math.abs(c.rot - c.target) < 0.5) {
                c.target += 360; // spin one more full turn
            }
        }
    });

    requestAnimationFrame(loop);
}

// touch
let touchStartX = 0;
window.addEventListener("touchstart", e => {
    touchStartX = e.touches[0].clientX;
}, { passive: true });
window.addEventListener("touchend", e => {
    if (scene.style.display === "none") return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) trigger(dx < 0 ? -1 : 1);
}, { passive: true });

// keyboard fallback — simulate ~18° lean + upright
window.addEventListener("keydown", e => {
    if (scene.style.display === "none") return;
    if (e.key === "ArrowRight") { tiltX = -3; beta = 90; }
    if (e.key === "ArrowLeft")  { tiltX =  3; beta = 90; }
});
window.addEventListener("keyup", e => {
    if (e.key === "ArrowRight" || e.key === "ArrowLeft") { tiltX = 0; beta = 0; }
});

btn.onclick = () => {
    const go = () => {
        startSc.style.display = "none";
        scene.style.display = "block";
        window.addEventListener("deviceorientation", handleOrientation);
        window.addEventListener("devicemotion", handleMotion);
        loop();
    };
    // request both orientation (for beta) and motion (for tiltX) permissions on iOS
    const reqOrientation = typeof DeviceOrientationEvent !== "undefined" &&
                           typeof DeviceOrientationEvent.requestPermission === "function"
        ? DeviceOrientationEvent.requestPermission()
        : Promise.resolve("granted");
    const reqMotion = typeof DeviceMotionEvent !== "undefined" &&
                      typeof DeviceMotionEvent.requestPermission === "function"
        ? DeviceMotionEvent.requestPermission()
        : Promise.resolve("granted");
    Promise.all([reqOrientation, reqMotion])
        .then(() => go())
        .catch(() => go());
};
</script>

</body>
</html>
